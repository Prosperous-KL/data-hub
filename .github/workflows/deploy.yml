name: CI and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      frontend-artifact: ${{ steps.build-frontend.outputs.frontend-path }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        id: build-frontend
        run: |
          npm run build
          echo "frontend-path=.next" >> $GITHUB_OUTPUT

  push-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.CR_PAT != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
        run: echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/prosperous-data-hub-backend:latest -f backend/Dockerfile backend
          docker push ghcr.io/${{ github.repository_owner }}/prosperous-data-hub-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/prosperous-data-hub-frontend:latest -f frontend/Dockerfile frontend
          docker push ghcr.io/${{ github.repository_owner }}/prosperous-data-hub-frontend:latest

  deploy-frontend-render:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST https://api.render.com/deploy/srv-${RENDER_SERVICE_ID}/deploys \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'

# Note: Backend deployment to Railway requires Railway CLI or API token.
# Add a manual step or provide `RAILWAY_API_KEY` and `RAILWAY_PROJECT_ID` to automate.