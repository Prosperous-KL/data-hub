services:
  - type: web
    name: data-hub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: "http://localhost:3000,https://data-hub-1-m4o4.onrender.com,https://data-hub-6kwj.onrender.com"
      - key: PAYMENT_PROVIDER
        value: "SIMULATED"
      - key: PAYMENT_CALLBACK_TOKEN
        sync: false
      - key: PAYMENT_CALLBACK_PROVIDER
        value: "AUTO"
      - key: HUBTEL_BASE_URL
        value: "https://api.hubtel.com"
      - key: HUBTEL_SMS_BASE_URL
        value: "https://smsc.hubtel.com/v1/messages/send"
      - key: HUBTEL_SMS_CLIENT_ID
        sync: false
      - key: HUBTEL_SMS_CLIENT_SECRET
        sync: false
      - key: HUBTEL_SMS_FROM
        sync: false
      - key: HUBTEL_CLIENT_ID
        sync: false
      - key: HUBTEL_CLIENT_SECRET
        sync: false
      - key: HUBTEL_SIGNING_SECRET
        sync: false
      - key: VTU_PROVIDER
        value: "SIMULATED"
      - key: SMTP_FROM_NAME
        value: "Prosperous Data Hub"
      - key: SMTP_GMAIL_USER
        sync: false
      - key: SMTP_GMAIL_APP_PASSWORD
        sync: false

  - type: web
    name: data-hub-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
