services:
  - type: web
    name: data-hub-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        fromGroup: frontend-env

# Note: Backend deployment is intended for Railway per project plan.
# Keep backend configuration and secrets in Railway project settings.
